<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Shows Mind Map</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 2rem;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.5rem;
      color: #888;
      font-size: 0.95rem;
    }

    main {
      width: 100%;
      max-width: 1400px;
      padding: 2rem;
      flex: 1;
    }

    .mindmap-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .mindmap-container img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      border: 1px solid #222;
      cursor: zoom-in;
      transition: transform 0.2s ease;
    }

    .mindmap-container img:active {
      cursor: zoom-out;
    }

    .placeholder {
      width: 100%;
      min-height: 400px;
      border: 2px dashed #333;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #555;
      gap: 0.75rem;
    }

    .placeholder svg {
      width: 48px;
      height: 48px;
      opacity: 0.4;
    }

    .placeholder p {
      font-size: 0.95rem;
    }

    footer {
      padding: 1.5rem;
      color: #444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>TV Shows Mind Map</h1>
    <p>A visual map of every show — watched, watching, and want to watch.</p>
  </header>

  <main>
    <div class="mindmap-container">
      <!-- Once you drop your mindmap image into mindmap-assets/, update the src below -->
      <!-- <img src="mindmap-assets/tv-mindmap.png" alt="TV Shows Mind Map" /> -->

      <div class="placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <p>Drop your mind map image into <code>mindmap-assets/</code> and update the <code>src</code> in index.html.</p>
      </div>
    </div>
  </main>

  <footer>tv.vaidehiagarwalla.com</footer>

  <script>
    // Click to toggle full-size zoom
    const img = document.querySelector('.mindmap-container img');
    if (img) {
      let zoomed = false;
      img.addEventListener('click', () => {
        zoomed = !zoomed;
        img.style.transform = zoomed ? 'scale(1.8)' : 'scale(1)';
        img.style.transformOrigin = 'top center';
        img.style.cursor = zoomed ? 'zoom-out' : 'zoom-in';
      });
    }
  </script>
</body>
</html>
