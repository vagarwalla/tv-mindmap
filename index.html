<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Shows Mind Map</title>
  <script>
    // Prevent flash of wrong theme — must run before body renders
    function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark'
      document.documentElement.setAttribute('data-theme', saved)
      const btn = document.getElementById('themeBtn')
      if (btn) btn.textContent = saved === 'dark' ? '☀' : '🌙'
    }
    initTheme()
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mind-elixir@5.9.3/dist/MindElixirLite.iife.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mind-elixir@5.9.3/dist/MindElixirLite.css">
  <style>
    :root {
      --bg: #0f0f0f;
      --header-bg: #111111;
      --border: #222222;
      --text: #f0f0f0;
      --btn-bg: #1e1e1e;
      --btn-border: #333333;
      --btn-text: #bbbbbb;
      --dim-text: #555555;
    }
    [data-theme="light"] {
      --bg: #f8f8f8;
      --header-bg: #ffffff;
      --border: #e0e0e0;
      --text: #111111;
      --btn-bg: #f0f0f0;
      --btn-border: #d0d0d0;
      --btn-text: #444444;
      --dim-text: #999999;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--header-bg);
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header p {
      color: var(--dim-text);
      font-size: 0.75rem;
      margin-top: 2px;
    }

    .controls {
      display: flex;
      gap: 0.5rem;
    }

    .controls button {
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--btn-text);
      padding: 0.3rem 0.7rem;
      border-radius: 5px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .controls button:hover {
      background: var(--btn-bg);
      color: var(--text);
      opacity: 0.85;
    }

    #map {
      flex: 1;
      width: 100%;
      overflow: hidden;
    }

    me-mind-elixir, .map-container {
      background: var(--bg) !important;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>TV Shows Mind Map</h1>
    </div>
    <div class="controls">
      <button onclick="mind.scale(1.25)">＋</button>
      <button onclick="mind.scale(0.8)">－</button>
      <button onclick="mind.toCenter()">⊙ Center</button>
      <button id="toggleBtn" onclick="toggleAll()">Expand All</button>
      <button id="themeBtn" onclick="toggleTheme()">☀</button>
      <a href="/edit" style="text-decoration:none;"><button>Edit</button></a>
    </div>
  </header>

  <div id="map"></div>

  <script>
    // ─── Theme ────────────────────────────────────────────────────────────────

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark'
      document.documentElement.setAttribute('data-theme', saved)
      document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀' : '🌙'
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark'
      const next = current === 'dark' ? 'light' : 'dark'
      document.documentElement.setAttribute('data-theme', next)
      localStorage.setItem('theme', next)
      document.getElementById('themeBtn').textContent = next === 'dark' ? '☀' : '🌙'
      if (mind) {
        mind.changeTheme(next === 'dark' ? DARK_THEME : LIGHT_THEME)
      }
    }

    initTheme()

    // ─── Mind Elixir themes ───────────────────────────────────────────────────

    const DARK_THEME = {
      name: 'dark',
      palette: ['#00ccff','#40e0d0','#6b8e23','#33CCCC','#ee82ee','#ffc0cb','#99cc00','#C0C0C0'],
      cssVar: { '--main-color':'#ffffff','--main-bgcolor':'#1a1a2e','--color':'#e0e0e0',
        '--bgcolor':'#1e1e2e','--panel-color':'#f0f0f0','--panel-bgcolor':'#2a2a3e',
        '--panel-border-color':'#444','--selected-color':'#ffffff','--selected-bgcolor':'#4a4a7a',
        '--line-color':'#555577','--line-width':'2px','--root-color':'#ffffff',
        '--root-bgcolor':'#1a1a2e','--root-radius':'8px','--radius':'5px' }
    }

    const LIGHT_THEME = {
      name: 'light',
      palette: ['#0066cc','#009999','#336600','#006666','#9900cc','#cc0066','#669900','#666666'],
      cssVar: { '--main-color':'#111','--main-bgcolor':'#e8f0fe','--color':'#222',
        '--bgcolor':'#f0f4ff','--panel-color':'#111','--panel-bgcolor':'#ffffff',
        '--panel-border-color':'#ccc','--selected-color':'#111','--selected-bgcolor':'#c8d8ff',
        '--line-color':'#8899aa','--line-width':'2px','--root-color':'#111',
        '--root-bgcolor':'#c8d8fe','--root-radius':'8px','--radius':'5px' }
    }

    // ─── Style helpers ───────────────────────────────────────────────────────

    function getBg(style) {
      return style?.background || style?.backgroundColor || null
    }

    function getTextColor(style) {
      if (style?.text?.color) return style.text.color
      const bg = getBg(style)
      if (bg) return contrastColor(bg)
      return '#e0e0e0'
    }

    function getFontSize(fontMultiplier) {
      const base = 12
      return Math.round(base * (fontMultiplier || 1)) + 'px'
    }

    function contrastColor(hex) {
      try {
        const c = hex.replace('#', '')
        const r = parseInt(c.substr(0,2), 16)
        const g = parseInt(c.substr(2,2), 16)
        const b = parseInt(c.substr(4,2), 16)
        const lum = (0.299*r + 0.587*g + 0.114*b) / 255
        return lum > 0.55 ? '#111111' : '#ffffff'
      } catch { return '#ffffff' }
    }

    // ─── MindMup → Mind Elixir converter ────────────────────────────────────

    function convertNode(mupNode) {
      const mupStyle = mupNode.attr?.style || {}
      const bg = getBg(mupStyle)
      const textColor = getTextColor(mupStyle)
      const fontSize = getFontSize(mupStyle.fontMultiplier)

      const node = {
        id: String(mupNode.id ?? Math.random().toString(36).slice(2)),
        topic: mupNode.title || '',
        children: [],
      }

      const styleObj = {}
      if (bg) styleObj.background = bg
      if (textColor) styleObj.color = textColor
      if (mupStyle.fontMultiplier && mupStyle.fontMultiplier !== 1) {
        styleObj.fontSize = fontSize
      }
      if (Object.keys(styleObj).length) node.style = styleObj

      if (mupNode.ideas && Object.keys(mupNode.ideas).length) {
        const sorted = Object.entries(mupNode.ideas)
          .sort(([a], [b]) => parseFloat(a) - parseFloat(b))
        for (const [, child] of sorted) {
          node.children.push(convertNode(child))
        }
      }

      return node
    }

    function convertMindmup(mup) {
      const root = {
        id: 'root',
        topic: 'TV Shows',
        style: {
          background: '#1a1a2e',
          color: '#ffffff',
          fontSize: '18px',
          fontWeight: 'bold',
        },
        children: [],
      }

      if (mup.ideas) {
        const sorted = Object.entries(mup.ideas)
          .sort(([a], [b]) => parseFloat(a) - parseFloat(b))
        for (const [, child] of sorted) {
          root.children.push(convertNode(child))
        }
      }

      return { nodeData: root }
    }

    // ─── Init ────────────────────────────────────────────────────────────────

    // Guard: fail fast with a clear message if the CDN script didn't load.
    // The IIFE exports a module namespace object — the constructor is at .default
    const MindElixirClass = MindElixirLite?.default
    if (typeof MindElixirClass !== 'function') {
      document.getElementById('map').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#c55;font-size:0.9rem;">' +
        'Could not load MindElixirLite from CDN. Check your network connection.' +
        '</div>'
      throw new Error('MindElixirLite.default is not a constructor — CDN script failed to load')
    }

    let mind
    let allExpanded = false

    const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark'

    fetch('mindmap-assets/TV SHOWS MINDMAP MINDMUP TELEVISION')
      .then(r => r.json())
      .then(mup => {
        const data = convertMindmup(mup)

        mind = new MindElixirClass({
          el: '#map',
          direction: MindElixirLite.SIDE,
          contextMenu: false,
          toolBar: false,
          keypress: true,
          theme: currentTheme === 'light' ? LIGHT_THEME : DARK_THEME,
        })

        mind.init(data)
      })
      .catch(err => {
        document.getElementById('map').innerHTML =
          `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#555;font-size:0.9rem;">
            Failed to load mind map: ${err.message}
          </div>`
      })

    function toggleAll() {
      if (!mind) return
      allExpanded = !allExpanded
      mind.expandNodeAll(mind.findEle('root'), allExpanded)
      document.getElementById('toggleBtn').textContent =
        allExpanded ? 'Collapse All' : 'Expand All'
    }
  </script>
</body>
</html>
