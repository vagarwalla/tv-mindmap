<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit · TV Shows Mind Map</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-elixir@5.9.3/dist/MindElixirLite.iife.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mind-elixir@5.9.3/dist/MindElixirLite.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Password gate ── */
    #gate {
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .gate-box {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .gate-box h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .gate-hint {
      font-size: 0.8rem;
      color: #555;
      line-height: 1.5;
    }

    .gate-box input[type="password"] {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 7px;
      color: #f0f0f0;
      font-size: 0.9rem;
      padding: 0.6rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .gate-box input[type="password"]:focus {
      border-color: #555;
    }

    .gate-box button[type="submit"] {
      width: 100%;
      background: #f0f0f0;
      color: #0f0f0f;
      border: none;
      border-radius: 7px;
      padding: 0.6rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .gate-box button[type="submit"]:hover { opacity: 0.85; }

    #gateError {
      font-size: 0.8rem;
      color: #e55;
      display: none;
    }

    /* ── Editor ── */
    #editor {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    #editor.visible { display: flex; }

    header {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: #111;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }

    .controls { display: flex; gap: 0.5rem; align-items: center; }

    .controls button, .controls a {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #bbb;
      padding: 0.3rem 0.7rem;
      border-radius: 5px;
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      display: inline-block;
    }

    .controls button:hover, .controls a:hover { background: #2a2a2a; color: #fff; }

    #saveBtn {
      background: #1a3a1a !important;
      border-color: #2a5a2a !important;
      color: #6ddb6d !important;
    }

    #saveBtn:hover { background: #1e4a1e !important; }
    #saveBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    #saveStatus {
      font-size: 0.75rem;
      color: #555;
    }

    #map { flex: 1; width: 100%; overflow: hidden; }
  </style>
</head>
<body>

  <!-- Password gate -->
  <div id="gate">
    <div class="gate-box">
      <h2>Editor Access</h2>
      <p class="gate-hint">What do members of V.F.D. say when they arrive at a secret meeting?</p>
      <form id="passwordForm">
        <div style="display:flex;flex-direction:column;gap:0.75rem">
          <div style="position:relative">
            <input type="password" id="passwordInput" placeholder="Password" autofocus autocomplete="current-password" style="width:100%;padding-right:2.5rem" />
            <button type="button" id="togglePw" onclick="togglePw()" style="position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#666;cursor:pointer;font-size:0.8rem;padding:0">Show</button>
          </div>
          <button type="submit" id="unlockBtn">Unlock</button>
          <p id="gateError" style="color:#e55;font-size:0.8rem;display:none">Incorrect password. Try again.</p>
        </div>
      </form>
    </div>
  </div>

  <!-- Editor (shown after auth) -->
  <div id="editor">
    <header>
      <h1>Edit · TV Shows</h1>
      <div class="controls">
        <button onclick="mind && mind.scale(1.25)">＋</button>
        <button onclick="mind && mind.scale(0.8)">－</button>
        <button onclick="mind && mind.toCenter()">⊙ Center</button>
        <button onclick="openSearchPanel()">+ Add Show</button>
        <button id="saveBtn" onclick="save()">Save</button>
        <span id="saveStatus"></span>
        <a href="/">← View</a>
      </div>
    </header>
    <div id="map"></div>

    <!-- TV Show Search Panel -->
    <div id="showSearchPanel" style="display:none; position:fixed; right:0; top:0; bottom:0; width:360px; background:#161616; border-left:1px solid #2a2a2a; z-index:50; flex-direction:column;">
      <div style="padding:1rem; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
        <h2 style="font-size:1rem; font-weight:600;">Add Show</h2>
        <button onclick="closeSearchPanel()" style="background:none;border:none;color:#888;cursor:pointer;font-size:1.2rem;">&#x2715;</button>
      </div>
      <div style="padding:1rem; border-bottom:1px solid #222;">
        <input id="showSearchInput" type="text" placeholder="Search TV shows&#x2026;" autocomplete="off"
          style="width:100%;background:#0f0f0f;border:1px solid #333;border-radius:6px;color:#f0f0f0;padding:0.5rem 0.75rem;font-size:0.9rem;outline:none;" />
      </div>
      <div id="showSearchResults" style="flex:1;overflow-y:auto;"></div>
      <div id="showSeasonPicker" style="display:none; padding:1rem; border-top:1px solid #222; max-height:280px; overflow-y:auto;"></div>
      <div style="padding:1rem; border-top:1px solid #222;">
        <button id="addShowBtn" onclick="addShowToMap()" disabled
          style="width:100%;background:#1a3a1a;border:1px solid #2a5a2a;color:#6ddb6d;padding:0.5rem;border-radius:6px;font-size:0.9rem;font-weight:600;cursor:pointer;">
          Add to Map
        </button>
      </div>
    </div>
  </div>

  <script>
    const TOKEN = 'dGhld29ybGRpc3F1aWV0aGVyZQ=='

    // ─── Show/hide password ───────────────────────────────────────────────────
    function togglePw() {
      const input = document.getElementById('passwordInput')
      const btn = document.getElementById('togglePw')
      input.type = input.type === 'password' ? 'text' : 'password'
      btn.textContent = input.type === 'password' ? 'Show' : 'Hide'
    }

    // ─── Password gate ───────────────────────────────────────────────────────
    if (sessionStorage.getItem('editUnlocked') === '1') showEditor()

    document.getElementById('passwordForm').addEventListener('submit', e => {
      e.preventDefault()
      const btn = document.getElementById('unlockBtn')
      const error = document.getElementById('gateError')
      const val = document.getElementById('passwordInput').value

      if (btoa(val) === TOKEN) {
        sessionStorage.setItem('editUnlocked', '1')
        showEditor()
      } else {
        error.style.display = 'block'
        document.getElementById('passwordInput').value = ''
        document.getElementById('passwordInput').focus()
        btn.textContent = 'Unlock'
        btn.disabled = false
      }
    })

    function showEditor() {
      document.getElementById('gate').style.display = 'none'
      document.getElementById('editor').classList.add('visible')
      loadEditor()
    }

    // ─── Search panel toggle (static, no auth needed) ─────────────────────────
    window.openSearchPanel = function() {
      document.getElementById('showSearchPanel').style.display = 'flex'
      document.getElementById('showSearchInput').focus()
    }
    window.closeSearchPanel = function() {
      document.getElementById('showSearchPanel').style.display = 'none'
    }

    // ─── Load editor module after auth ───────────────────────────────────────
    function loadEditor() {
      if (typeof MindElixirLite === 'undefined') {
        document.getElementById('map').innerHTML =
          '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#e55;font-size:0.9rem;">Could not load MindElixirLite from CDN. Check your network.</div>'
        return
      }
      const s = document.createElement('script')
      s.type = 'module'
      s.textContent = `
        import { convertMindmup, convertToMindmup } from './src/utils.js'
        import { searchShows, getSeasons, formatShowTopic } from './src/tv-search.js'

        let mind
        let selectedShowForAdd = null
        let selectedSeasonsForAdd = new Set()

        // ─── Search panel logic ───────────────────────────────────────────────
        let searchDebounce
        document.getElementById('showSearchInput').addEventListener('input', e => {
          clearTimeout(searchDebounce)
          const q = e.target.value.trim()
          if (!q) { document.getElementById('showSearchResults').innerHTML = ''; return }
          searchDebounce = setTimeout(() => renderSearchResults(q), 300)
        })

        async function renderSearchResults(query) {
          const container = document.getElementById('showSearchResults')
          container.innerHTML = '<div style="padding:1rem;color:#555;font-size:0.85rem;">Searching&#x2026;</div>'
          const shows = await searchShows(query)
          if (!shows.length) {
            container.innerHTML = '<div style="padding:1rem;color:#555;font-size:0.85rem;">No shows found</div>'
            return
          }
          container.innerHTML = shows.slice(0, 8).map(s => \`
            <div onclick="selectShowForAdd('\${s.id}','\${s.name.replace(/'/g,"\\\\'")}','\${s.source}')"
              style="display:flex;gap:0.75rem;padding:0.75rem 1rem;cursor:pointer;border-bottom:1px solid #1a1a1a;align-items:center;"
              onmouseenter="this.style.background='#1e1e1e'" onmouseleave="this.style.background=''">
              \${s.image ? \`<img src="\${s.image}" style="width:36px;height:50px;object-fit:cover;border-radius:3px;flex-shrink:0;" />\` : '<div style="width:36px;height:50px;background:#2a2a2a;border-radius:3px;flex-shrink:0;"></div>'}
              <div>
                <div style="font-size:0.9rem;font-weight:500;">\${s.name}</div>
                <div style="font-size:0.75rem;color:#666;">\${[s.year, s.network].filter(Boolean).join(' · ')}</div>
              </div>
            </div>
          \`).join('')
        }

        window.selectShowForAdd = async function(id, name, source) {
          selectedShowForAdd = { id, name, source }
          selectedSeasonsForAdd = new Set()
          document.getElementById('addShowBtn').disabled = true
          const picker = document.getElementById('showSeasonPicker')
          picker.style.display = 'block'
          picker.innerHTML = '<div style="color:#555;font-size:0.85rem;">Loading seasons&#x2026;</div>'

          const seasons = await getSeasons(id)
          if (!seasons.length) {
            picker.innerHTML = '<div style="color:#555;font-size:0.85rem;">No season info available</div>'
            document.getElementById('addShowBtn').disabled = false
            return
          }

          picker.innerHTML = \`
            <div style="font-size:0.8rem;font-weight:600;color:#888;margin-bottom:0.5rem;">SEASONS</div>
            <label style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;cursor:pointer;font-size:0.85rem;">
              <input type="checkbox" id="allSeasonsCheck" onchange="toggleAllSeasons(this.checked)" checked />
              All seasons
            </label>
            <div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.25rem;">
              \${seasons.map(s => \`
                <label style="display:flex;align-items:center;gap:0.3rem;cursor:pointer;font-size:0.8rem;background:#1e1e1e;border:1px solid #333;border-radius:4px;padding:0.2rem 0.5rem;">
                  <input type="checkbox" class="season-check" value="\${s.number}" onchange="updateSeasonSelection()" checked />
                  S\${s.number}\${s.name ? \` · \${s.name}\` : ''}
                </label>
              \`).join('')}
            </div>
          \`
          document.getElementById('addShowBtn').disabled = false
        }

        window.toggleAllSeasons = function(checked) {
          document.querySelectorAll('.season-check').forEach(cb => cb.checked = checked)
          updateSeasonSelection()
        }

        window.updateSeasonSelection = function() {
          const checked = [...document.querySelectorAll('.season-check:checked')].map(cb => parseInt(cb.value))
          const total = document.querySelectorAll('.season-check').length
          selectedSeasonsForAdd = new Set(checked)
          const allCheck = document.getElementById('allSeasonsCheck')
          if (allCheck) allCheck.checked = checked.length === total
        }

        window.addShowToMap = function() {
          if (!selectedShowForAdd || !window.mind) return
          const allChecked = document.querySelectorAll('.season-check').length === selectedSeasonsForAdd.size
          const seasons = allChecked ? [] : [...selectedSeasonsForAdd].sort((a,b)=>a-b)
          const topic = formatShowTopic(selectedShowForAdd.name, seasons)

          const newNode = { id: 'n' + Date.now(), topic, children: [] }
          const parent = window.mind.currentNode
          if (parent && parent.nodeObj) {
            parent.nodeObj.children = parent.nodeObj.children || []
            parent.nodeObj.children.push(newNode)
          } else {
            window.mind.nodeData.children.push(newNode)
          }
          window.mind.refresh()

          selectedShowForAdd = null
          selectedSeasonsForAdd = new Set()
          document.getElementById('showSearchInput').value = ''
          document.getElementById('showSearchResults').innerHTML = ''
          document.getElementById('showSeasonPicker').style.display = 'none'
          document.getElementById('addShowBtn').disabled = true
        }

        fetch('mindmap-assets/TV SHOWS MINDMAP MINDMUP TELEVISION')
          .then(r => r.json())
          .then(mup => {
            const data = convertMindmup(mup)
            mind = new MindElixirLite({
              el: '#map',
              direction: MindElixirLite.SIDE,
              contextMenu: false,
              toolBar: false,
              keypress: true,
              theme: {
                name: 'dark',
                palette: ['#00ccff','#40e0d0','#6b8e23','#33CCCC','#ee82ee','#ffc0cb','#99cc00','#C0C0C0','#ff0000','#FFFFFF','#e6e6fa','#A52A2A'],
                cssVar: {
                  '--main-color': '#ffffff', '--main-bgcolor': '#1a1a2e',
                  '--color': '#e0e0e0', '--bgcolor': '#1e1e2e',
                  '--panel-color': '#f0f0f0', '--panel-bgcolor': '#2a2a3e',
                  '--panel-border-color': '#444', '--selected-color': '#ffffff',
                  '--selected-bgcolor': '#4a4a7a', '--line-color': '#555577',
                  '--line-width': '2px', '--root-color': '#ffffff',
                  '--root-bgcolor': '#1a1a2e', '--root-radius': '8px', '--radius': '5px',
                },
              },
            })
            mind.init(data)
            window.mind = mind
          })
          .catch(err => {
            document.getElementById('map').innerHTML =
              '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#e55">Failed to load: ' + err.message + '</div>'
          })

        window.save = async function() {
          const btn = document.getElementById('saveBtn')
          const status = document.getElementById('saveStatus')
          btn.disabled = true
          status.textContent = 'Saving…'
          status.style.color = '#888'
          try {
            const mindmupJson = convertToMindmup(JSON.parse(JSON.stringify(mind.getData())))
            const res = await fetch('/api/save', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ data: mindmupJson }),
            })
            if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || 'Server error ' + res.status) }
            status.textContent = 'Saved! Site updates in ~1 min.'
            status.style.color = '#6ddb6d'
          } catch (err) {
            status.textContent = 'Error: ' + err.message
            status.style.color = '#e55'
          } finally {
            btn.disabled = false
            setTimeout(() => { status.textContent = '' }, 5000)
          }
        }
      `
      document.body.appendChild(s)
    }
  </script>
</body>
</html>
